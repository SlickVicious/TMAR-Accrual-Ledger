const STATUS_KEY = id => 'huey_status_' + id;
const LASTOPEN_KEY = id => 'huey_last_' + id;
const activeTags = new Set();
let activeYear = null;
let qstr = '';
let view = localStorage.getItem('huey_view') || 'shelves';
let sortMode = localStorage.getItem('huey_sort') || 'newest';

function debounce(fn, ms){ let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; }
function getStatus(id){ return localStorage.getItem(STATUS_KEY(id)) || ''; }
function setStatus(id, s){ if(s) localStorage.setItem(STATUS_KEY(id), s); else localStorage.removeItem(STATUS_KEY(id)); render(); }
function touch(id){ localStorage.setItem(LASTOPEN_KEY(id), Date.now()); }
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function byId(id){ return DATA.records.find(x => x.id === id); }

function matches(r){
  if(activeYear && r.year !== activeYear) return false;
  if(activeTags.size){
    const has = [...activeTags].every(t => r.tags.includes(t) || r.series === t);
    if(!has) return false;
  }
  if(qstr){
    const hay = (r.title + ' ' + r.folder + ' ' + r.series + ' ' + (r.date||'') + ' ' + r.tags.join(' ')).toLowerCase();
    if(!hay.includes(qstr)) return false;
  }
  return true;
}

function sortRecs(list){
  const l = [...list];
  if(sortMode === 'az') l.sort((a,b) => a.title.localeCompare(b.title));
  else if(sortMode === 'oldest') l.sort((a,b) => (a.date||'9999').localeCompare(b.date||'9999'));
  else l.sort((a,b) => (b.date||'0000').localeCompare(a.date||'0000'));
  return l;
}

const ICONS = {
  transcript: '<svg viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>',
  recording:  '<svg viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>',
  notes:      '<svg viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>',
  files:      '<svg viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 19a2 2 0 01-2-2V7a2 2 0 012-2h4l2 2h4a2 2 0 012 2v1M5 19h14a2 2 0 002-2v-5a2 2 0 00-2-2H9a2 2 0 00-2 2v5a2 2 0 01-2 2z"/></svg>',
};

function assetPills(r){
  const pills = [];
  if(r.assets.transcript) pills.push(`<span class="asset-pill" title="Transcript page">${ICONS.transcript}TX</span>`);
  if(r.assets.recording)  pills.push(`<span class="asset-pill" title="Video recording">${ICONS.recording}VID</span>`);
  if(r.assets.notes)      pills.push(`<span class="asset-pill" title="Markdown notes">${ICONS.notes}MD</span>`);
  const n = Object.values(r.counts).reduce((a,b)=>a+b,0);
  if(r.kind === 'resource' && n) pills.push(`<span class="asset-pill" title="Files inside">${ICONS.files}${n} files</span>`);
  return pills.join('');
}

function cardHtml(r){
  const status = getStatus(r.id);
  const dateStr = r.date || (r.kind === 'resource' ? 'Resource' : 'No Date');
  const cls = 'card' + (r.kind === 'resource' ? ' resource' : '') + (r.archive ? ' archive' : '');
  const play = r.assets.recording
    ? `<button class="btn-play" data-play="${escapeHtml(r.id)}" title="Play recording" aria-label="Play recording"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>`
    : '';
  return `<div class="${cls}" role="button" tabindex="0" aria-label="${escapeHtml(r.title)}" data-id="${escapeHtml(r.id)}" title="${escapeHtml(r.folder)}" style="--c1:${r.grad[0]};--c2:${r.grad[1]}">
    <div class="card-top">
      <span class="date ${r.date?'':'nodate'}">${escapeHtml(dateStr)}</span>
      <span class="series-badge">${escapeHtml(r.series)}</span>
    </div>
    ${play}
    <div class="card-content">
      <div class="title">${escapeHtml(r.title)}</div>
      <div class="assets">${assetPills(r)}</div>
    </div>
    ${status ? `<span class="status-flag ${status}">
      ${status==='watched'
        ? `<svg class="icon-watched" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"/></svg>watched`
        : `<svg class="icon-watching" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z"/></svg>watching`}
    </span>` : ''}
  </div>`;
}

function renderRow(label, items, wrap){
  if(!items.length) return '';
  const inner = items.map(cardHtml).join('');
  return `<section class="row"><h2>${escapeHtml(label)}<span class="count">${items.length}</span></h2><div class="${wrap||'scroller'}">${inner}</div></section>`;
}

function render(){
  const main = document.getElementById('main');
  const filtered = DATA.records.filter(matches);
  const classes = DATA.records.filter(r => r.kind === 'class');
  const watchedN = classes.filter(r => getStatus(r.id) === 'watched').length;
  let html = '';

  if(view === 'shelves'){
    if(!qstr && activeTags.size === 0 && !activeYear){
      const watching = DATA.records.filter(r => getStatus(r.id) === 'watching');
      const recent = DATA.records
        .filter(r => localStorage.getItem(LASTOPEN_KEY(r.id)))
        .sort((a,b) => +localStorage.getItem(LASTOPEN_KEY(b.id)) - +localStorage.getItem(LASTOPEN_KEY(a.id)))
        .slice(0, 12);
      html += renderRow('Continue Watching', watching);
      html += renderRow('Recently Opened', recent);
    }
    const groups = {};
    filtered.forEach(r => { (groups[r.series] = groups[r.series] || []).push(r); });
    for(const s of DATA.series_order.filter(s => groups[s])){
      html += renderRow(s, sortRecs(groups[s]));
    }
  } else if(view === 'grid'){
    html += `<section class="row"><div class="gridwrap">${sortRecs(filtered).map(cardHtml).join('')}</div></section>`;
  } else { // timeline
    const dated = sortRecs(filtered.filter(r => r.date));
    const undated = filtered.filter(r => !r.date);
    const years = {};
    dated.forEach(r => { (years[r.year] = years[r.year] || []).push(r); });
    const ykeys = Object.keys(years).sort((a,b) => sortMode === 'oldest' ? a-b : b-a);
    for(const y of ykeys) html += renderRow(y, years[y], 'gridwrap');
    if(undated.length) html += renderRow('Undated / Resources', undated, 'gridwrap');
  }

  if(!filtered.length) html = `<div class="empty">No recordings match your filter.</div>`;
  main.innerHTML = html;
  document.getElementById('stats').innerHTML =
    `${filtered.length} of ${DATA.records.length} <span class="sub">&middot; ${watchedN}/${classes.length} watched</span>`;
  document.querySelectorAll('.views button').forEach(b => b.classList.toggle('on', b.dataset.view === view));
}

function renderTags(){
  const c = document.getElementById('tags');
  const yearChips = DATA.years.map(y =>
    `<span class="chip year ${activeYear===y?'on':''}" role="button" tabindex="0" aria-pressed="${activeYear===y}" data-y="${y}">${y}</span>`).join('');
  const tagChips = DATA.tags.map(t =>
    `<span class="chip ${activeTags.has(t)?'on':''}" role="button" tabindex="0" aria-pressed="${activeTags.has(t)}" data-t="${escapeHtml(t)}">${escapeHtml(t)}</span>`).join('');
  c.innerHTML = `<span class="label">Year</span>${yearChips}<span class="label" style="margin-left:0.75rem">Topic</span>${tagChips}` +
    `<span class="chip" id="clearTags" role="button" tabindex="0" style="border-style:dashed">clear</span>`;
}

function openRecord(r, uri){
  touch(r.id);
  if(getStatus(r.id) === '') localStorage.setItem(STATUS_KEY(r.id), 'watching');
  window.open(uri || r.primary, '_blank');
  render();
}

document.getElementById('q').addEventListener('input', debounce(e => { qstr = e.target.value.trim().toLowerCase(); render(); }, 150));
document.getElementById('sort').value = sortMode;
document.getElementById('sort').addEventListener('change', e => { sortMode = e.target.value; localStorage.setItem('huey_sort', sortMode); render(); });
document.querySelector('.views').addEventListener('click', e => {
  const b = e.target.closest('button[data-view]'); if(!b) return;
  view = b.dataset.view; localStorage.setItem('huey_view', view); render();
});

document.getElementById('tags').addEventListener('keydown', e => {
  if(e.key !== 'Enter' && e.key !== ' ') return;
  e.preventDefault(); e.target.click();
});
document.getElementById('tags').addEventListener('click', e => {
  if(e.target.id === 'clearTags'){ activeTags.clear(); activeYear = null; renderTags(); render(); return; }
  const y = e.target.getAttribute('data-y');
  if(y){ activeYear = activeYear === +y ? null : +y; renderTags(); render(); return; }
  const t = e.target.getAttribute('data-t'); if(!t) return;
  if(activeTags.has(t)) activeTags.clear();
  else { activeTags.clear(); activeTags.add(t); }
  renderTags(); render();
});

let menuTarget = null;

document.body.addEventListener('keydown', e => {
  if(e.key !== 'Enter' && e.key !== ' ') return;
  const card = e.target.closest?.('.card');
  if(!card) return;
  e.preventDefault();
  const r = byId(card.getAttribute('data-id'));
  if(r) openRecord(r);
});

document.body.addEventListener('click', e => {
  let target = e.target;
  while (target && typeof target.closest !== 'function') target = target.parentNode;
  if (!target) return;
  const playBtn = target.closest('.btn-play');
  if(playBtn){
    e.stopPropagation();
    const r = byId(playBtn.getAttribute('data-play'));
    if(r && r.assets.recording) openRecord(r, r.assets.recording);
    closeMenu();
    return;
  }
  const card = target.closest('.card');
  if(card){
    const r = byId(card.getAttribute('data-id'));
    if(r) openRecord(r);
  }
  closeMenu();
});

function openMenu(x, y, id) {
  menuTarget = id;
  const r = byId(id);
  const m = document.getElementById('menu');
  m.querySelector('[data-act="open"]').classList.toggle('hidden', !r);
  m.querySelector('[data-act="open"]').innerHTML = m.querySelector('[data-act="open"]').innerHTML.replace(/Open (Transcript|Item)/, r && r.assets.transcript ? 'Open Transcript' : 'Open Item');
  m.querySelector('[data-act="play"]').classList.toggle('hidden', !(r && r.assets.recording));
  m.querySelector('[data-act="notes"]').classList.toggle('hidden', !(r && r.assets.notes));
  const pad = 8, vw = window.innerWidth, vh = window.innerHeight;
  m.style.display = 'block';
  const rect = m.getBoundingClientRect();
  m.style.left = Math.min(x, vw - rect.width - pad) + 'px';
  m.style.top = Math.min(y, window.scrollY + vh - rect.height - pad) + 'px';
  const items = [...m.querySelectorAll('[role="menuitem"]')].filter(i => !i.classList.contains('hidden'));
  items.forEach((item, i) => item.setAttribute('tabindex', i === 0 ? '0' : '-1'));
  items[0]?.focus();
}

function closeMenu() {
  const m = document.getElementById('menu');
  m.style.display = 'none';
  m.querySelectorAll('[role="menuitem"]').forEach(item => item.setAttribute('tabindex', '-1'));
  menuTarget = null;
}

document.getElementById('menu').addEventListener('keydown', e => {
  const items = [...document.getElementById('menu').querySelectorAll('[role="menuitem"]')].filter(i => !i.classList.contains('hidden'));
  const idx = items.indexOf(document.activeElement);
  if(e.key === 'ArrowDown') { e.preventDefault(); items[(idx + 1) % items.length]?.focus(); }
  else if(e.key === 'ArrowUp') { e.preventDefault(); items[(idx - 1 + items.length) % items.length]?.focus(); }
  else if(e.key === 'Escape') { closeMenu(); }
  else if(e.key === 'Enter' || e.key === ' ') { e.preventDefault(); document.activeElement.click(); }
});

document.body.addEventListener('contextmenu', e => {
  let target = e.target;
  while (target && typeof target.closest !== 'function') target = target.parentNode;
  if (!target) return;
  const card = target.closest('.card');
  if(!card) return;
  e.preventDefault();
  openMenu(e.pageX, e.pageY, card.getAttribute('data-id'));
});

document.getElementById('menu').addEventListener('click', e => {
  e.stopPropagation();
  let target = e.target;
  while (target && typeof target.closest !== 'function') target = target.parentNode;
  if (!target) return;
  const actElem = target.closest('div[data-act]');
  const act = actElem?.getAttribute('data-act');
  if(!act || !menuTarget) return;
  const r = byId(menuTarget);
  if(!r){ closeMenu(); return; }
  if(act === 'open') openRecord(r, r.assets.transcript || r.primary);
  else if(act === 'play' && r.assets.recording) openRecord(r, r.assets.recording);
  else if(act === 'notes' && r.assets.notes) openRecord(r, r.assets.notes);
  else if(act === 'folder') window.open(r.folderUri, '_blank');
  else if(act === 'clear') setStatus(r.id, '');
  else setStatus(r.id, act);
  closeMenu();
});

// ---- progress export / import ----
document.getElementById('exportBtn').addEventListener('click', () => {
  const out = {};
  for(let i = 0; i < localStorage.length; i++){
    const k = localStorage.key(i);
    if(k.startsWith('huey_')) out[k] = localStorage.getItem(k);
  }
  const blob = new Blob([JSON.stringify(out, null, 1)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'huey-library-progress.json';
  a.click();
  URL.revokeObjectURL(a.href);
});
document.getElementById('importBtn').addEventListener('click', () => document.getElementById('importFile').click());
document.getElementById('importFile').addEventListener('change', e => {
  const f = e.target.files[0]; if(!f) return;
  const rd = new FileReader();
  rd.onload = () => {
    try {
      const obj = JSON.parse(rd.result);
      let n = 0;
      for(const [k, v] of Object.entries(obj)){
        if(k.startsWith('huey_') && typeof v === 'string'){ localStorage.setItem(k, v); n++; }
      }
      alert('Imported ' + n + ' progress entries.');
      renderTags(); render();
    } catch(err){ alert('Could not read that file: ' + err.message); }
  };
  rd.readAsText(f);
  e.target.value = '';
});

renderTags();
render();
</script>
