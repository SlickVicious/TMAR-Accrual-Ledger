    let currentSlide = 0;

    function renderSlide(index) {
      const slide = slides[index];
      const card = document.getElementById('slideCard');
      
      if (slide.isHero) {
        card.innerHTML = `
          <div class="text-center">
            <h1 class="text-4xl md:text-5xl font-bold mb-4" style="background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">${slide.title}</h1>
            ${slide.content}
          </div>
        `;
      } else {
        card.innerHTML = `
          <h2 class="text-3xl font-bold mb-6" style="color: #1e3c72;">${slide.title}</h2>
          ${slide.content}
        `;
      }
      
      updateNav();
      updateDots();
    }

    function updateNav() {
      document.getElementById('prevBtn').disabled = currentSlide === 0;
      document.getElementById('nextBtn').disabled = currentSlide === slides.length - 1;
      document.getElementById('counter').textContent = `${currentSlide + 1} / ${slides.length}`;
    }

    function updateDots() {
      const dotsContainer = document.getElementById('dots');
      dotsContainer.innerHTML = slides.map((_, i) => 
        `<button onclick="goToSlide(${i})" class="dot w-2 h-2 rounded-full ${i === currentSlide ? 'bg-yellow-400' : 'bg-white/40'} hover:bg-yellow-300"></button>`
      ).join('');
    }

    function nextSlide() {
      if (currentSlide < slides.length - 1) {
        currentSlide++;
        renderSlide(currentSlide);
      }
    }

    function prevSlide() {
      if (currentSlide > 0) {
        currentSlide--;
        renderSlide(currentSlide);
      }
    }

    function goToSlide(index) {
      currentSlide = index;
      renderSlide(currentSlide);
    }

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') nextSlide();
      if (e.key === 'ArrowLeft') prevSlide();
    });

    // Particle animation
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const particles = [];
    for (let i = 0; i < 80; i++) {
      particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        radius: Math.random() * 2 + 1,
        speedX: (Math.random() - 0.5) * 0.5,
        speedY: (Math.random() - 0.5) * 0.5,
        opacity: Math.random() * 0.5 + 0.3
      });
    }

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 215, 0, ${p.opacity})`;
        ctx.fill();
        p.x += p.speedX;
        p.y += p.speedY;
        if (p.x < 0 || p.x > canvas.width) p.speedX *= -1;
        if (p.y < 0 || p.y > canvas.height) p.speedY *= -1;
      });
      requestAnimationFrame(animateParticles);
    }

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    // Initialize
    renderSlide(0);
    animateParticles();
  </script>
